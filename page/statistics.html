<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistics - Library Management System</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <!-- Sidebar Toggle Button -->
        <button type="button" class="sidebar-toggle" id="sidebarToggle" aria-label="Open sidebar">
            <i class="fas fa-bars"></i>
        </button>

        <!-- Sidebar Overlay for mobile -->
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <!-- Sidebar Navigation -->
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-book-open"></i>
                    <h2>STEPLibrary</h2>
                </div>
                <!-- Close button for mobile -->
                <button type="button" class="sidebar-close" id="sidebarClose" aria-label="Close sidebar">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <ul class="nav-menu">
                <li><a href="../index.html" class="nav-link">
                        <i class="fas fa-tachometer-alt"></i>
                        <span>Dashboard</span>
                    </a></li>
                <li><a href="books.html" class="nav-link">
                        <i class="fas fa-book"></i>
                        <span>Books</span>
                    </a></li>
                <li><a href="visitors.html" class="nav-link">
                        <i class="fas fa-users"></i>
                        <span>Visitors</span>
                    </a></li>
                <li><a href="cards.html" class="nav-link">
                        <i class="fas fa-id-card"></i>
                        <span>Library Cards</span>
                    </a></li>
                <li><a href="statistics.html" class="nav-link active">
                        <i class="fas fa-chart-bar"></i>
                        <span>Statistics</span>
                    </a></li>
                    <li><a href="https://myportfolio-udej.vercel.app/" class="nav-link">
                            <i class="fas fa-cog"></i>
                            <span>About-Author</span>
                        </a></li>
            </ul>
        </nav>

        <!-- Main Content -->
        <main class="main-content" id="mainContent">
            <header class="page-header">
                <div class="header-content">
                    <h1><i class="fas fa-chart-bar"></i> Library Statistics</h1>
                    <div class="header-actions">
                        <button type="button" id="refreshStatsBtn" class="btn btn-primary">
                            <i class="fas fa-sync-alt"></i> Refresh
                        </button>
                    </div>
                </div>
            </header>

            <div class="page-content">
                <!-- Statistics Overview -->
                <div class="stats-overview">
                    <div class="overview-card">
                        <div class="overview-icon books">
                            <i class="fas fa-book"></i>
                        </div>
                        <div class="overview-content">
                            <h3 id="statsBooks">0</h3>
                            <p>Total Books</p>
                        </div>
                    </div>

                    <div class="overview-card">
                        <div class="overview-icon visitors">
                            <i class="fas fa-users"></i>
                        </div>
                        <div class="overview-content">
                            <h3 id="statsVisitors">0</h3>
                            <p>Total Visitors</p>
                        </div>
                    </div>

                    <div class="overview-card">
                        <div class="overview-icon transactions">
                            <i class="fas fa-exchange-alt"></i>
                        </div>
                        <div class="overview-content">
                            <h3 id="statsTransactions">0</h3>
                            <p>Total Transactions</p>
                        </div>
                    </div>

                    <div class="overview-card">
                        <div class="overview-icon active">
                            <i class="fas fa-clock"></i>
                        </div>
                        <div class="overview-content">
                            <h3 id="statsActive">0</h3>
                            <p>Currently Borrowed</p>
                        </div>
                    </div>
                </div>

                <!-- Charts Section -->
                <div class="charts-section">
                    <!-- Popular Books -->
                    <div class="chart-card">
                        <div class="chart-header">
                            <h3><i class="fas fa-trophy"></i> Top 5 Most Popular Books</h3>
                        </div>
                        <div class="chart-content">
                            <div id="popularBooks" class="ranking-list"></div>
                        </div>
                    </div>

                    <!-- Active Visitors -->
                    <div class="chart-card">
                        <div class="chart-header">
                            <h3><i class="fas fa-star"></i> Top 5 Most Active Visitors</h3>
                        </div>
                        <div class="chart-content">
                            <div id="activeVisitors" class="ranking-list"></div>
                        </div>
                    </div>
                </div>

                <!-- Additional Statistics -->
                <div class="additional-stats">
                    <div class="stat-card">
                        <div class="stat-header">
                            <h3><i class="fas fa-calendar-alt"></i> Monthly Activity</h3>
                        </div>
                        <div class="stat-content">
                            <div id="monthlyActivity" class="activity-chart"></div>
                        </div>
                    </div>

                    <div class="stat-card">
                        <div class="stat-header">
                            <h3><i class="fas fa-percentage"></i> Return Rate</h3>
                        </div>
                        <div class="stat-content">
                            <div id="returnRate" class="return-stats"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/data-manager.js"></script>
    <script src="../js/notification.js"></script>
    <script src="../js/sidebar.js"></script>
    <script src="../js/statistics.js"></script>
</body>

</html>
