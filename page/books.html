<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Books - Library Management System</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <!-- Sidebar Toggle Button -->
        <button class="sidebar-toggle" id="sidebarToggle" type="button" aria-label="Open sidebar">
            <i class="fas fa-bars"></i>
        </button>

        <!-- Sidebar Overlay for mobile -->
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <!-- Sidebar Navigation -->
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-book-open"></i>
                    <h2>STEPLibrary</h2>
                </div>
                <!-- Close button for mobile -->
                <button class="sidebar-close" id="sidebarClose" type="button" aria-label="Close sidebar">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <ul class="nav-menu">
                <li><a href="../index.html" class="nav-link">
                        <i class="fas fa-tachometer-alt"></i>
                        <span>Dashboard</span>
                    </a></li>
                <li><a href="books.html" class="nav-link active">
                        <i class="fas fa-book"></i>
                        <span>Books</span>
                    </a></li>
                <li><a href="visitors.html" class="nav-link">
                        <i class="fas fa-users"></i>
                        <span>Visitors</span>
                    </a></li>
                <li><a href="cards.html" class="nav-link">
                        <i class="fas fa-id-card"></i>
                        <span>Library Cards</span>
                    </a></li>
                <li><a href="statistics.html" class="nav-link">
                        <i class="fas fa-chart-bar"></i>
                        <span>Statistics</span>
                    </a></li>
                    <li><a href="https://myportfolio-udej.vercel.app/" class="nav-link">
                            <i class="fas fa-cog"></i>
                            <span>About-Author</span>
                        </a></li>
            </ul>
        </nav>

        <!-- Main Content -->
        <main class="main-content" id="mainContent">
            <header class="page-header">
                <div class="header-content">
                    <h1><i class="fas fa-book"></i> Books Management</h1>
                    <div class="header-actions">
                        <button type="button" id="addBookBtn" class="btn btn-primary">
                            <i class="fas fa-plus"></i> Add New Book
                        </button>
                    </div>
                </div>
            </header>

            <div class="page-content">
                <!-- Search and Filter Controls -->
                <div class="controls-card">
                    <div class="search-section">
                        <div class="search-box">
                            <i class="fas fa-search"></i>
                            <input type="text" id="bookSearch"
                                placeholder="Search books by name, author, or publisher...">
                        </div>

                        <div class="filter-section">
                            <select id="bookSort">
                                <option value="">Sort by...</option>
                                <option value="name">Book Name</option>
                                <option value="author">Author Name</option>
                                <option value="copies">Number of Copies</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Books List -->
                <div class="data-card">
                    <div class="card-header">
                        <h3><i class="fas fa-list"></i> Books Collection</h3>
                        <span id="booksCount" class="count-badge">0 books</span>
                    </div>
                    <div id="booksList" class="data-content"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Book Modal -->
    <div id="bookModal" class="modal-overlay">
        <div class="form-card modal-content">
            <div class="form-header">
                <h3 id="bookFormTitle"><i class="fas fa-plus-circle"></i> Add New Book</h3>
                <button type="button" id="closeFormBtn" class="btn-close" aria-label="Close form">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <form id="bookForm" class="fancy-form">
                <input type="hidden" id="bookId">

                <div class="form-row">
                    <div class="form-group">
                        <label for="bookName">
                            <i class="fas fa-book"></i> Book Name *
                        </label>
                        <input type="text" id="bookName" required>
                    </div>

                    <div class="form-group">
                        <label for="bookAuthor">
                            <i class="fas fa-user-edit"></i> Author Name *
                        </label>
                        <input type="text" id="bookAuthor" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="bookYear">
                            <i class="fas fa-calendar"></i> Year of Publishing *
                        </label>
                        <input type="number" id="bookYear" min="1" required>
                    </div>

                    <div class="form-group">
                        <label for="bookPublisher">
                            <i class="fas fa-building"></i> Publisher Name *
                        </label>
                        <input type="text" id="bookPublisher" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="bookPages">
                            <i class="fas fa-file-alt"></i> Number of Pages *
                        </label>
                        <input type="number" id="bookPages" min="1" required>
                    </div>

                    <div class="form-group">
                        <label for="bookCopies">
                            <i class="fas fa-copy"></i> Number of Copies *
                        </label>
                        <input type="number" id="bookCopies" min="0" required>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> Save Book
                    </button>
                    <button type="button" id="cancelFormBtn" class="btn btn-secondary">
                        <i class="fas fa-times"></i> Cancel
                    </button>
                </div>
            </form>
        </div>
    </div>


    <script src="../js/data-manager.js"></script>
    <script src="../js/notification.js"></script>
    <script src="../js/sidebar.js"></script>
    <script src="../js/books.js"></script>
</body>

</html>
